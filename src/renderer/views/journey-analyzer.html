<!-- views/journey-analyzer.html -->
<div id="journey-analyzer-section" class="section">
    <div class="section-header">
        <button id="journeyAnalyzerBackBtn" class="back-button">← Volver a la lista</button>            
        <div class="header-actions">
            <button id="expandAllAnalyzerBtn" class="action-button">Expandir Todo</button>
            <button id="collapseAllAnalyzerBtn" class="action-button">Colapsar Todo</button>
            <button id="downloadJourneyPdfBtn" class="action-button activate-btn">Generar PDF</button>
            <button id="downloadJourneyWordBtn" class="action-button" style="background-color: #2b5797;">Generar Word</button>
        </div>
    </div>
    <h2>Análisis de Journey: <span id="analyzerJourneyNameTitle" style="color: #558ac7;"></span></h2>

    <div class="config-section-container">
        <!-- 1. Identificación y Entrada -->
        <div id="journeyAnalyzerHeaderWrapper" style="margin-bottom: 20px;"></div>

        <!-- 2. Goals y Exits -->
        <div id="journeyAnalyzerGlobalWrapper" style="margin-bottom: 20px;"></div>

        <!-- 3. Flujo Lógico -->
        <div id="journeyAnalyzerFlowWrapper" style="margin-bottom: 20px;"></div>
        <div style="margin: 40px 0 15px 0; padding-bottom: 8px; border-bottom: 2px solid #558ac7; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 1.2rem;">⚙️</span>
            <h3 style="margin: 0; color: #558ac7; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;">
                Actividades del Journey
            </h3>
        </div>
        <!-- 4. Actividades -->
        <div id="journeyAnalyzerActivitiesContainer"></div>
    </div>
</div>
